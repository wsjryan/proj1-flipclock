<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Clock</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:   #111111;
      --card: #252525;
      --text: #ffffff;
      --dim:  #888888;
      --line: #000000;
      --btn:  #333333;
      --btn2: #444444;
      --shadow: rgba(0,0,0,.55);
    }
    body.light {
      --bg:   #dcdcdc;
      --card: #ffffff;
      --text: #111111;
      --dim:  #555555;
      --line: #cccccc;
      --btn:  #c4c4c4;
      --btn2: #b0b0b0;
      --shadow: rgba(0,0,0,.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Trebuchet MS', Arial, sans-serif;
      transition: background .4s;
      user-select: none;
    }

    /* ── Controls ── */
    .ctrl {
      position: fixed;
      top: 22px; right: 22px;
      display: flex; gap: 10px;
      z-index: 10;
    }
    .ctrl button {
      background: var(--btn);
      color: var(--text);
      border: none;
      padding: 9px 20px;
      border-radius: 22px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: .4px;
      transition: background .3s, color .3s;
    }
    .ctrl button:hover { background: var(--btn2); }
    #fs { padding: 9px 12px; display: flex; align-items: center; justify-content: center; }

    /* ── Date ── */
    .date {
      color: var(--dim);
      font-size: 24px;
      letter-spacing: 3px;
      margin-bottom: 46px;
      font-family: Arial, sans-serif;
      font-weight: normal;
      transition: color .4s;
    }

    /* ── Clock row ── */
    .clock {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .grp { display: flex; gap: 7px; }

    .colon {
      font-size: 106px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      padding-bottom: 12px;
      transition: color .4s;
    }

    .credit {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--dim);
      font-size: 14px;
      letter-spacing: 3px;
      margin-top: 36px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 300;
      transition: color .4s;
    }
    .credit-logo {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      opacity: 0.6;
      transition: opacity .3s;
    }
    .credit-logo:hover { opacity: 1; }

    .ap {
      font-size: 26px;
      font-weight: bold;
      color: var(--text);
      align-self: flex-end;
      padding-bottom: 17px;
      min-width: 55px;
      transition: color .4s;
    }

    /* ══════════════════════════
       Flip Digit
       Elements:
         .fa  – top "permanent" display; also the exit flap (0°→-90°)
         .fta – top enter flap (90°→0°, delayed)
         .sb  – bottom "permanent" display
         .fb  – bottom enter flap (90°→0°, delayed)
    ══════════════════════════ */
    .d {
      position: relative;
      width: 98px;
      height: 137px;
      perspective: 420px;
      border-radius: 11px;
      box-shadow: 0 6px 18px var(--shadow);
    }

    /* ── Shared half styles ── */
    .d .fa, .d .fta, .d .sb, .d .fb {
      position: absolute;
      left: 0; width: 100%; height: 68.5px;
      overflow: hidden;
      background: var(--card);
      transition: background .4s;
    }

    /* ── Top halves ── */
    .d .fa, .d .fta {
      top: 0;
      border-radius: 11px 11px 0 0;
      border-bottom: 1.5px solid var(--line);
      transform-origin: bottom center;
      backface-visibility: hidden;
    }
    /* .fa is flat (0°) at rest — it IS the top display */
    /* .fta starts hidden at 90° — will rotate in */
    .d .fta { transform: rotateX(90deg); }

    /* ── Bottom halves ── */
    .d .sb, .d .fb {
      bottom: 0;
      border-radius: 0 0 11px 11px;
      transform-origin: top center;
      backface-visibility: hidden;
    }
    /* .sb is flat (0°) at rest — it IS the bottom display */
    /* .fb starts hidden at 90° — will rotate in */
    .d .fb { transform: rotateX(90deg); }

    /* ── Digit text ── */
    .d span {
      display: block;
      width: 100%;
      text-align: center;
      font-size: 106px;
      font-weight: 900;
      color: var(--text);
      line-height: 137px;   /* full card height; each half clips to its portion */
      transition: color .4s;
    }
    /* Bottom halves: shift up so the lower portion of the digit is visible */
    .d .sb span,
    .d .fb span { margin-top: -68.5px; }

    /* ── Subtle depth gradient ── */
    .d .fa::after, .d .fta::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 55%, rgba(0,0,0,.18));
      pointer-events: none;
    }
    .d .sb::after, .d .fb::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, transparent 55%, rgba(0,0,0,.10));
      pointer-events: none;
    }

    /* ── Flip keyframes ── */
    @keyframes flipOut { from { transform: rotateX(0deg);  } to { transform: rotateX(-90deg); } }
    @keyframes flipIn  { from { transform: rotateX(90deg); } to { transform: rotateX(0deg);   } }

    /* Phase 1 (0–280ms): fa exits */
    .d.go .fa  { animation: flipOut .28s ease-in  forwards; }
    /* Phase 2 (280–560ms): fta and fb enter */
    .d.go .fta { animation: flipIn  .28s ease-out .28s forwards; }
    .d.go .fb  { animation: flipIn  .28s ease-out .28s forwards; }
  </style>
</head>

<script>
const DAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
let dark = true, h24 = true;

/* ── Build a single flip-digit element ── */
function mkDigit(id) {
  const el = document.createElement('div');
  el.className = 'd';
  el.id = id;
  el.dataset.v = '';
  // fa  = top permanent display / exit flap
  // fta = top enter flap
  // sb  = bottom permanent display
  // fb  = bottom enter flap
  el.innerHTML = `
    <div class="fa"><span>0</span></div>
    <div class="fta"><span>0</span></div>
    <div class="sb"><span>0</span></div>
    <div class="fb"><span>0</span></div>`;
  return el;
}

function initGroup(gid, ids) {
  const g = document.getElementById(gid);
  ids.forEach(id => g.appendChild(mkDigit(id)));
}
initGroup('gh', ['h0','h1']);
initGroup('gm', ['m0','m1']);
initGroup('gs', ['s0','s1']);

/* ── Set digit instantly (no animation) ── */
function setStatic(el, v) {
  el.querySelectorAll('span').forEach(s => s.textContent = v);
  el.dataset.v = String(v);
}

/* ── Animate a digit change ── */
function flipTo(el, nv) {
  const sv = String(nv);
  if (el.dataset.v === sv) return;

  const ov = el.dataset.v;
  el.dataset.v = sv;

  const fa  = el.querySelector('.fa');
  const fta = el.querySelector('.fta');
  const sb  = el.querySelector('.sb');
  const fb  = el.querySelector('.fb');

  // fa  shows old top  (will rotate out 0°→-90°)
  fa.querySelector('span').textContent  = ov;
  // fta shows new top  (will rotate in  90°→0°, delayed)
  fta.querySelector('span').textContent = sv;
  // sb  still shows old bottom (visible during phase 1)
  // fb  shows new bottom (will rotate in 90°→0°, delayed)
  fb.querySelector('span').textContent  = sv;

  /* ── WHY this is overlap-free ──
   * Phase 1 (0–280ms):
   *   fa (ov) exits → blank card face briefly visible at transition point → natural
   *   fta (sv) is at 90° (invisible)
   *   sb (ov) is flat, visible → correct
   *   fb (sv) is at 90° (invisible)
   *
   * Phase 2 (280–560ms):
   *   fa is at -90° (invisible, held by forwards)
   *   fta (sv) rotates in 90°→0°  → reveals new top, same value as sb update below
   *   fb  (sv) rotates in 90°→0°  → covers old sb
   *
   * No moment where old and new numbers are simultaneously visible. ✓
   */

  el.classList.remove('go');
  void el.offsetWidth;          // force reflow to restart animations
  el.classList.add('go');

  // At the midpoint fb starts covering sb → safe to update sb now
  setTimeout(() => {
    sb.querySelector('span').textContent = sv;
  }, 290);

  // After all animations finish: reset state
  setTimeout(() => {
    // Update fa's content so it's ready for the next flip at 0°
    fa.querySelector('span').textContent = sv;
    el.classList.remove('go');
    // After class removal:
    //   fa  snaps -90°→0° (now shows sv) — matches what fta was showing  ✓
    //   fta snaps  0°→90° (hidden)
    //   fb  snaps  0°→90° (hidden)
    //   sb  shows sv ✓
  }, 700);
}

/* ── Main clock tick ── */
function tick() {
  const now = new Date();

  const y  = now.getFullYear();
  const mo = now.getMonth() + 1;
  const d  = now.getDate();
  const wd = DAYS[now.getDay()];
  document.getElementById('dt').textContent =
    `${y}년 ${String(mo).padStart(2,'0')}월 ${String(d).padStart(2,'0')}일 (${wd})`;

  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  let ap = '';

  if (!h24) {
    ap = h >= 12 ? 'PM' : 'AM';
    h  = h % 12 || 12;
  }
  document.getElementById('ap').textContent = ap;

  [
    ['h0', Math.floor(h / 10)], ['h1', h % 10],
    ['m0', Math.floor(m / 10)], ['m1', m % 10],
    ['s0', Math.floor(s / 10)], ['s1', s % 10],
  ].forEach(([id, v]) => {
    const el = document.getElementById(id);
    el.dataset.v === '' ? setStatic(el, v) : flipTo(el, v);
  });
}

/* ── Controls ── */
document.getElementById('th').onclick = () => {
  dark = !dark;
  document.body.classList.toggle('light', !dark);
  document.getElementById('th').textContent = dark ? '라이트 모드' : '다크 모드';
};

document.getElementById('fmt').onclick = () => {
  h24 = !h24;
  document.getElementById('fmt').textContent = h24 ? '12시간' : '24시간';
  document.querySelectorAll('.d').forEach(el => el.dataset.v = '');
  tick();
};

tick();
setInterval(tick, 1000);

/* ── Fullscreen button ── */
document.getElementById('fs').onclick = () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
};

document.addEventListener('fullscreenchange', () => {
  document.getElementById('fs').innerHTML = document.fullscreenElement
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V3h4"/><path d="M21 7V3h-4"/><path d="M3 17v4h4"/><path d="M21 17v4h-4"/></svg>`;
});
</script>
